<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-300 flex items-center justify-center min-h-screen">
    <div class="bg-white p-16 rounded-2xl ">
        <p class="text-2xl font-bold mb-8 text-center">My To-Do list</p>
        <form id="todo-form" class="mb-6 ">
            <input id="todo-input" type="text" placeholder="Add a task" class="border-2 rounded-2xl px-6 py-4 " />
            <button class="bg-blue-500 font-semibold px-4 py-2 rounded-2xl ">Add</button>
        </form>
        <ol id="todo-list" class="space-y-2 ">
            <li> Codewars</li>
            <li> Typing</li>
            <li> ES6</li>
            <li> BA project</li>
        </ol>
    </div>
    <script src="script.js"></script>
</body>

</html>
